server:
  port: 8083

spring:
  ai:
    dashscope:
      chat:
        options:
          model: qwen-plus
          temperature: 0.7
          max-tokens: 1000
      embedding:
        options:
          model: text-embedding-v4
          dimensions: 1536
    vectorstore:
      milvus:
        client:
          host: 127.0.0.1
          port: 19530
        database: default
        collection: vector_store
        embedding-dimension: 1536
        index-type: IVF_FLAT
        metric-type: COSINE

vector:
  top-k: 5
  min-score: 0.6
  dimensions: 1536

webhook:
  wechat: ""
  feishu: ""
  dingtalk: ""

rest:
  template:
    connect-timeout: 5000
    read-timeout: 30000

logging:
  level:
    com.tik.aipushpushservice: DEBUG
    com.tik.aipushpushservice.mapper: DEBUG
