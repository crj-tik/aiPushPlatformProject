spring:
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:}
      chat:
        options:
          model: ${DASHSCOPE_CHAT_MODEL:qwen-plus}
          temperature: ${DASHSCOPE_CHAT_TEMPERATURE:0.7}
          max-tokens: ${DASHSCOPE_CHAT_MAX_TOKENS:1000}
      embedding:
        options:
          model: ${DASHSCOPE_EMBEDDING_MODEL:text-embedding-v4}
          dimensions: ${DASHSCOPE_EMBEDDING_DIMENSIONS:1536}
    vectorstore:
      milvus:
        client:
          host: localhost
          port: 19530
        database: default
        collection: vector_store
        embedding-dimension: 1536
        index-type: IVF_FLAT
        metric-type: COSINE
    retry:
      max-attempts: 3
      backoff:
        initial-interval: 1000
        multiplier: 2
  application:
    name: aiPush-push-service
  profiles:
    active: dev
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/aiPush?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:aiPushU}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-test-query: SELECT 1
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        namespace: public
        group: DEFAULT_GROUP
      config:
        server-addr: localhost:8848
        file-extension: yaml
        namespace: public
        group: DEFAULT_GROUP
        refresh-enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:127.0.0.1:9092}
    consumer:
      group-id: ${KAFKA_PUSH_GROUP_ID:push-alert-summary-group}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.tik.aipushpushservice.bean
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: true
    lazy-loading-enabled: false
    jdbc-type-for-null: NULL

webhook:
  wechat: ${WECHAT_WEBHOOK:}
  feishu: ${FEISHU_WEBHOOK:}
  dingtalk: ${DINGTALK_WEBHOOK:}

vector:
  top-k: 5
  min-score: 0.6
  dimensions: 1536

logging:
  level:
    com.tik.aipushpushservice: DEBUG
    com.tik.aipushpushservice.mapper: DEBUG

rest:
  template:
    connect-timeout: 5000
    read-timeout: 30000
    max-connections: 100
    max-per-route: 20

app:
  kafka:
    topic:
      alert-push-request: ${ALERT_PUSH_REQUEST_TOPIC:alert-push-request}
      alert-push-summary: ${ALERT_PUSH_SUMMARY_TOPIC:alert-push-summary}
