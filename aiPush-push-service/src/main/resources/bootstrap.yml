spring:
  application:
    name: aiPush-push-service
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: public
        group: DEFAULT_GROUP
        username: nacos
        password: nacos
        metadata:
          version: v1
          module: push
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yaml
        namespace: public
        group: DEFAULT_GROUP
        username: nacos
        password: nacos
        refresh-enabled: true
        extension-configs:
          - data-id: datasource.yaml
            group: DEFAULT_GROUP
            refresh: true
          - data-id: mybatis.yaml
            group: DEFAULT_GROUP
            refresh: true
          - data-id: ai.yaml
            group: DEFAULT_GROUP
            refresh: true
        shared-configs:
          - data-id: common.yaml
            group: DEFAULT_GROUP
            refresh: true
