server:
  port: 8082

info:
  app:
    name: ${spring.application.name}
    version: 1.0.0
    description: 人员预警服务

spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:127.0.0.1:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000
        loggerLevel: basic
  circuitbreaker:
    enabled: true

logging:
  level:
    com.tik.aipushwarningservice: debug
    com.tik.aipushwarningservice.feign: debug
    com.alibaba.cloud.ai: debug
    com.alibaba.nacos: info

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

pagehelper:
  helper-dialect: mysql
  reasonable: true
  support-methods-arguments: true
  auto-runtime-dialect: true

app:
  kafka:
    topic:
      alert-push-request: ${ALERT_PUSH_REQUEST_TOPIC:alert-push-request}
